version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes: 
      - ./api:/app

  worker:
    build: ./worker
    depends_on:
      - redis

volumes:
  redis_data: