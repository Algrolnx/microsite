version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: micrositedb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes: 
      - ./api:/app

  worker:
    build: ./worker
    depends_on:
      - db
      - redis

volumes:
  redis_data:
  postgres_data: